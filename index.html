<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEMAKER LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --text-glow: rgba(59,130,246,0.5);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: #fff;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Background subtle grid ── */
  .bg-grid {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 30% 50%, black 30%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 30% 50%, black 30%, transparent 70%);
  }

  /* ── Ambient glow behind text ── */
  .ambient-glow {
    position: fixed;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse at center, rgba(59,130,246,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    filter: blur(60px);
  }

  /* ── Page edge blue glow ── */
  .edge-glow {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 100% 350px at 50% 0%,   rgba(59,130,246,0.2) 0%, transparent 40%),
      radial-gradient(ellipse 100% 280px at 50% 100%, rgba(59,130,246,0.14) 0%, transparent 40%),
      radial-gradient(ellipse 350px 100% at 0% 50%,   rgba(59,130,246,0.2) 0%, transparent 40%),
      radial-gradient(ellipse 280px 100% at 100% 50%, rgba(59,130,246,0.14) 0%, transparent 40%);
  }

  /* ── Top Navigation ── */
  .top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 48px;
  }

  .nav-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .nav-logo:hover { color: #fff; }

  .nav-links {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.48);
    text-decoration: none;
    letter-spacing: 0.04em;
    cursor: pointer;
    position: relative;
    transition:
      color 0.4s ease,
      text-shadow 0.4s ease;
    isolation: isolate;
  }

  /* Blue glow background — guaranteed visible */
  .nav-link::before {
    content: '';
    position: absolute;
    inset: -6px -14px;
    background: rgba(59,130,246,0);
    border-radius: 4px;
    filter: blur(10px);
    z-index: -1;
    transition: background 0.4s ease;
  }
  .nav-link:hover::before {
    background: rgba(59,130,246,0.35);
  }

  .nav-link:hover {
    color: #93c5fd;
    text-shadow:
      0 0 4px  rgba(147,197,253,0.9),
      0 0 16px rgba(59,130,246,0.6),
      0 0 36px rgba(59,130,246,0.3);
  }

  /* Underline animation */
  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0;
    height: 1px;
    background: #60a5fa;
    transition: width 0.35s ease;
  }
  .nav-link:hover::after {
    width: 100%;
  }

  /* ── Hero Text ── */
  .hero {
    position: relative;
    z-index: 2;
    height: 100dvh;
    display: flex;
    align-items: center;
    padding-left: 180px;
  }

  .hero-text {
    display: flex;
    flex-direction: column;
    line-height: 1.25;
  }

  .hero-line {
    font-family: 'Inter', 'Franklin Gothic Heavy', 'Helvetica Neue', sans-serif;
    font-size: 5rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: #e4e4e7;
    user-select: none;
    cursor: default;
    filter:
      drop-shadow(0 0 8px rgba(59,130,246,0.8))
      drop-shadow(0 0 24px rgba(59,130,246,0.45))
      drop-shadow(0 0 48px rgba(59,130,246,0.2));
    transition: filter 0.45s ease;
  }

  /* ── Bottom hint ── */
  .bottom-hint {
    position: fixed;
    bottom: 40px;
    left: 180px;
    z-index: 2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.06em;
  }

  /* ── Contact modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: #18181b;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 32px 36px;
    min-width: 380px;
    max-width: 440px;
    font-family: 'JetBrains Mono', monospace;
  }
  .modal h3 {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }
  .modal .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }
  .modal .contact-row:last-child { border-bottom: none; }
  .modal .contact-label {
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    min-width: 70px;
  }
  .modal .contact-value {
    color: rgba(255,255,255,0.85);
  }
  .modal .close-btn {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s ease;
  }
  .modal .close-btn:hover {
    background: rgba(255,255,255,0.06);
    color: #fff;
    border-color: rgba(255,255,255,0.18);
  }

  @keyframes fadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }

  /* ── Typing cursor ── */
  .type-cursor {
    display: inline;
    color: #60a5fa;
    margin-left: 0;
    animation: cursorBlink 0.6s infinite;
    text-shadow: 0 0 12px rgba(96,165,250,0.6), 0 0 28px rgba(59,130,246,0.3);
    font-family: 'Inter', 'Franklin Gothic Heavy', 'Helvetica Neue', sans-serif;
    font-weight: 900;
  }
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .bottom-hint {
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .bottom-hint.show {
    opacity: 1;
  }

  /* ── Mobile ── */
  @media (max-width: 860px) {
    .top-nav {
      padding: 20px 24px;
    }
    .nav-links {
      gap: 20px;
    }
    .nav-link {
      font-size: 11px;
    }
    .hero {
      padding-left: 32px;
    }
    .hero-line {
      font-size: 2.6rem;
    }
    .bottom-hint {
      left: 32px;
      bottom: 28px;
      font-size: 10px;
    }
    .ambient-glow {
      left: 0;
    }
  }

  @media (max-width: 540px) {
    .top-nav {
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }
    .nav-links {
      gap: 16px;
      flex-wrap: wrap;
    }
    .hero-line {
      font-size: 2rem;
    }
    .modal {
      min-width: auto;
      margin: 20px;
    }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="ambient-glow"></div>
<div class="edge-glow"></div>

<!-- ── Top Navigation ── -->
<nav class="top-nav">
  <a href="index.html" class="nav-logo">IEMAKER LAB</a>
  <div class="nav-links">
    <a href="assistant.html" class="nav-link">Student Assistant</a>
    <a href="staff.html" class="nav-link">IC Staff</a>
    <a class="nav-link" onclick="openContact()">CONTACT</a>
  </div>
</nav>

<!-- ── Hero ── -->
<div class="hero">
  <div class="hero-text">
    <span class="hero-line" id="heroLine1"></span>
    <span class="hero-line" id="heroLine2"></span>

  </div>
</div>

<div class="bottom-hint">Innovation &amp; Entrepreneurship Maker Lab</div>

<!-- ── Contact Modal ── -->
<div class="modal-overlay hidden" id="contactModal" onclick="closeContact(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Contact</h3>
    <div class="contact-row">
      <span class="contact-label">Location</span>
      <span class="contact-value">WS03, IE Maker Lab</span>
    </div>
    <div class="contact-row">
      <span class="contact-label">Email</span>
      <span class="contact-value">iemaker@example.edu</span>
    </div>
    <div class="contact-row">
      <span class="contact-label">Hours</span>
      <span class="contact-value">Mon–Fri 9:00–18:00</span>
    </div>
    <button class="close-btn" onclick="closeContact()">Close</button>
  </div>
</div>

<script>
  function openContact() {
    document.getElementById('contactModal').classList.remove('hidden');
  }
  function closeContact(e) {
    if (e && e.target !== document.getElementById('contactModal')) return;
    document.getElementById('contactModal').classList.add('hidden');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('contactModal').classList.add('hidden');
    }
  });

  // ── Typing animation ──
  (function startTyping() {
    const line1 = document.getElementById('heroLine1');
    const line2 = document.getElementById('heroLine2');
    if (!line1 || !line2) return;

    const phrases = [
      ['Hello', 'MAKUBATORS!'],
      ['Welcome to', 'IE MAKER LAB'],
      ["Let's Create", 'Something AMAZING!']
    ];

    // Create cursor element (vertical bar)
    const cursor = document.createElement('span');
    cursor.className = 'type-cursor';
    cursor.textContent = '|';

    const TYPE_SPEED = 80;
    const DELETE_SPEED = 35;
    const PAUSE_AFTER_TYPE = 2000;
    const PAUSE_AFTER_DELETE = 400;

    let phraseIdx = 0;
    let lineIdx = 0;     // 0 = line1, 1 = line2
    let charIdx = 0;
    let isDeleting = false;

    function getLine() { return lineIdx === 0 ? line1 : line2; }

    function tick() {
      const [word1, word2] = phrases[phraseIdx];
      const currentWord = lineIdx === 0 ? word1 : word2;
      const line = getLine();

      if (!isDeleting) {
        // ── TYPING ──
        if (charIdx < currentWord.length) {
          // Remove trailing cursor-char from text, add new char, re-append cursor span
          line.textContent = line.textContent.replace(/\|$/, '') + currentWord[charIdx];
          charIdx++;
          line.appendChild(cursor);
          setTimeout(tick, TYPE_SPEED + Math.random() * 30);
        } else {
          // Current line finished — remove cursor span
          if (cursor.parentNode) cursor.remove();
          if (lineIdx === 0) {
            // Move to line 2
            lineIdx = 1;
            charIdx = 0;
            line2.appendChild(cursor);
            setTimeout(tick, TYPE_SPEED);
          } else {
            // Both lines done — pause, then start deleting from line 2
            setTimeout(function() {
              isDeleting = true;
              charIdx = word2.length;
              line2.appendChild(cursor);
              tick();
            }, PAUSE_AFTER_TYPE);
          }
        }
      } else {
        // ── DELETING ──
        if (charIdx > 0) {
          // Remove cursor-char, then remove one actual character, re-append cursor
          line.textContent = line.textContent.replace(/\|$/, '').slice(0, -1);
          charIdx--;
          line.appendChild(cursor);
          setTimeout(tick, DELETE_SPEED + Math.random() * 15);
        } else {
          // Current line fully deleted
          if (cursor.parentNode) cursor.remove();
          line.textContent = '';
          if (lineIdx === 0) {
            // Both lines empty — move to next phrase
            phraseIdx = (phraseIdx + 1) % phrases.length;
            isDeleting = false;
            lineIdx = 0;
            charIdx = 0;
            line1.appendChild(cursor);
            setTimeout(tick, PAUSE_AFTER_DELETE);
          } else {
            // Move up to line 1 and delete it
            lineIdx = 0;
            charIdx = phrases[phraseIdx][0].length;
            line1.appendChild(cursor);
            setTimeout(tick, DELETE_SPEED);
          }
        }
      }
    }

    // Show bottom hint after first phrase completes
    setTimeout(function() {
      const hint = document.querySelector('.bottom-hint');
      if (hint) hint.classList.add('show');
    }, 3500);

    // Start
    line1.appendChild(cursor);
    setTimeout(tick, 400);
  })();
</script>

</body>
</html>
