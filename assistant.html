<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IE Maker Lab · Student Assistant Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b; --surface: #111113;
    --card: rgba(255,255,255,0.025); --card-hover: rgba(255,255,255,0.045);
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.13);
    --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
    --accent: #3b82f6; --accent-hover: #2563eb; --accent-muted: rgba(59,130,246,0.12);
    --success: #22c55e; --warning: #eab308; --danger: #ef4444;
    --radius: 8px; --radius-sm: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; overflow: hidden;
    font-size: 14px; letter-spacing: -0.01em;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 30% 50%, black 30%, transparent 70%);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    position: relative; z-index: 1; width: 360px; min-width: 360px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100dvh;
  }
  .left-header { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; text-align:center; }
  .left-header h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #818cf8, #6366f1, #3b82f6, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .left-header .subtitle { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
  .reset-btn {
    margin-top: 10px; padding: 5px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
    background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .reset-btn:hover { color: var(--danger); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.06); }
  .left-scroll { flex:1; overflow-y: auto; padding: 8px 14px 14px; }
  .left-scroll::-webkit-scrollbar { width: 4px; }
  .left-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  .task-section { margin-top: 14px; }
  .task-section:first-child { margin-top: 4px; }
  .task-section-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; padding: 0 4px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 7px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-print { background: var(--accent); } .dot-laser { background: var(--warning); } .dot-general { background: var(--text-muted); }
  .cl-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px;
    border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .12s; line-height: 1.5;
  }
  .cl-item:hover { background: var(--card-hover); }

  /* Universal blue glow on all interactive elements */
  button, .home-link, .reset-btn, .icon-btn, .ms-item, .feedback-btn, .btn-cancel, .btn-confirm, .cl-item {
    position: relative; isolation: isolate;
  }
  button::before, .home-link::before, .reset-btn::before, .icon-btn::before, .ms-item::before,
  .feedback-btn::before, .btn-cancel::before, .btn-confirm::before, .cl-item::before {
    content: ''; position: absolute; inset: -2px; border-radius: inherit;
    background: rgba(59,130,246,0); filter: blur(8px); z-index: -1;
    transition: background 0.35s ease;
  }
  button:hover::before, .home-link:hover::before, .reset-btn:hover::before, .icon-btn:hover::before,
  .ms-item:hover::before, .feedback-btn:hover::before, .btn-cancel:hover::before, .btn-confirm:hover::before,
  .cl-item:hover::before {
    background: rgba(59,130,246,0.22);
  }
  .cl-check {
    width:20px; height:20px; border-radius:50%; border:2px solid var(--border);
    flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center;
    font-size:11px; transition:all .15s; color:transparent;
  }
  .cl-text { flex:1; min-width:0; }
  .cl-title { font-weight:600; }
  .cl-item.done .cl-check { background:var(--success); border-color:var(--success); color:#fff; }
  .cl-item.done .cl-title { color:var(--text-muted); text-decoration:line-through; }
  .cl-signoffs { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .cl-signoff-chip { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(34,197,94,0.12); color:var(--success); font-weight:600; }
  .left-footer { padding:10px 18px; border-top:1px solid var(--border); flex-shrink:0; font-size:11px; color:var(--text-muted); text-align:center; }

  /* Name signoff modal */
  .name-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; display:flex; align-items:center; justify-content:center; }
  .name-modal-overlay.hidden { display:none; }
  .name-modal { background:#18181b; border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:24px 28px; min-width:320px; max-width:380px; }
  .name-modal h4 { font-size:15px; font-weight:700; margin-bottom:6px; }
  .name-modal .task-preview { font-size:13px; color:var(--text-secondary); margin-bottom:14px; line-height:1.5; }
  .name-modal input { width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; font-family:inherit; outline:none; }
  .name-modal input:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
  .btn-cancel { padding:8px 20px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; background:transparent; border:1px solid var(--border); color:var(--text-secondary); font-family:inherit; }
  .btn-confirm { padding:8px 20px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; background:var(--accent); border:none; color:#fff; font-family:inherit; }
  .btn-confirm:hover { background:var(--accent-hover); }

  /* ── RIGHT PANEL ── */
  .right-panel { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); }
  .header { display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .header .home-link { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-muted); text-decoration:none; letter-spacing:0.04em; padding:6px 10px; border-radius:5px; }
  .header .home-link:hover { color:var(--text); }
  .header-logo { width:38px; height:38px; border-radius:9px; background:linear-gradient(135deg,var(--accent),#06b6d4); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:#fff; flex-shrink:0; }
  .header-info { flex:1; min-width:0; }
  .header-title { font-size:18px; font-weight:700; letter-spacing:-0.02em; }
  .header-subtitle { font-size:11px; color:var(--text-muted); }
  .icon-btn { padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-family:inherit; transition:all .15s; }
  .icon-btn:hover { background:rgba(255,255,255,0.04); color:var(--text); border-color:var(--border-hover); }

  .chat-container { flex:1; overflow-y:auto; padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
  .chat-container::-webkit-scrollbar { width:5px; }
  .chat-container::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:4px; }

  .welcome-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:32px 24px; text-align:center; }
  .welcome-card h2 { font-size:22px; font-weight:700; margin-bottom:10px; }
  .welcome-card h2 .nebula {
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #3b82f6, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome-card p { color:var(--text-secondary); font-size:17px; }
  .welcome-card p .nebula {
    background: linear-gradient(135deg, #8b5cf6, #6366f1, #3b82f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; font-weight:600;
  }

  .main-menu { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:16px; }
  .menu-section { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px 20px 24px; display:flex; flex-direction:column; gap:14px; }
  .menu-section .ms-header { display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:16px; border-bottom:1px solid var(--border); text-align:center; }
  .menu-section .ms-title { font-size:20px; font-weight:700; letter-spacing:-0.02em; }
  .menu-section .ms-sub { font-size:13px; color:var(--text-muted); }
  .menu-section .ms-items { display:flex; flex-direction:column; gap:8px; }
  .ms-item {
    background:transparent; border:1px solid transparent; color:var(--text-secondary);
    border-radius:6px; padding:14px 12px; font-size:16px; cursor:pointer;
    transition:all .15s; text-align:center; font-family:inherit; font-weight:500;
  }
  .ms-item:hover { background:rgba(255,255,255,0.03); border-color:var(--border); color:var(--text); }
  .ms-item:active { background:rgba(255,255,255,0.06); }

  /* Chat bubbles */
  .bubble-row { display:flex; gap:10px; animation:fadeIn .2s ease; max-width:100%; }
  .bubble-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .bubble-avatar.user { background:var(--accent); color:#fff; }
  .bubble-avatar.bot { background:linear-gradient(135deg,var(--accent),#06b6d4); color:#fff; }
  .bubble-row.user { justify-content:flex-end; }
  .bubble { max-width:78%; padding:12px 18px; border-radius:12px; font-size:14px; line-height:1.6; }
  .bubble.user { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .bubble.bot { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .guide-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; }
  .guide-card .g-title { font-size:16px; font-weight:700; margin-bottom:8px; }
  .g-row { display:flex; gap:10px; align-items:flex-start; margin-top:4px; }
  .g-num { width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .tag-chip { display:inline-block; font-size:10px; padding:2px 8px; border-radius:4px; margin-top:10px; font-weight:600; }
  .tag-chip.coming { background:rgba(59,130,246,0.10); color:var(--accent); }
  .tag-chip.daily { background:rgba(234,179,8,0.10); color:var(--warning); }
  .tag-chip.warning { background:rgba(239,68,68,0.10); color:#ef4444; }
  .typing-dots { display:flex; gap:4px; padding:4px 0; }
  .typing-dots span { width:7px; height:7px; border-radius:50%; background:var(--text-muted); animation:bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay:.2s; } .typing-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .feedback-row { margin-top:10px; padding-top:8px; border-top:1px solid var(--border); font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
  .feedback-btn { padding:3px 12px; border-radius:10px; font-size:11px; cursor:pointer; background:transparent; border:1px solid var(--border); color:var(--text-muted); font-family:inherit; transition:all .15s; }
  .feedback-btn:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .feedback-btn.active { background:var(--accent-muted); color:var(--accent); border-color:var(--accent); }

  .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#18181b; border:1px solid var(--border); color:var(--text); padding:10px 22px; border-radius:8px; font-size:13px; z-index:100; display:none; pointer-events:none; }

  @media (max-width:860px) {
    body { flex-direction:column; }
    .left-panel { width:100%; min-width:0; max-height:40vh; border-right:none; border-bottom:1px solid var(--border); }
    .right-panel { height:auto; flex:1; }
    .main-menu { grid-template-columns:1fr; }
    .chat-container { padding:14px; }
    .bubble { max-width:90%; }
  }
/* ── MagicBento border glow ── */
.glow-card {
  position: relative; overflow: hidden;
  --glow-x: 50%; --glow-y: 50%; --glow-intensity: 0; --glow-rgb: 132,0,255;
}
.glow-card::after {
  content: ''; position: absolute; inset: 0; padding: 2px; border-radius: inherit;
  background: radial-gradient(300px circle at var(--glow-x) var(--glow-y),
    rgba(var(--glow-rgb), calc(var(--glow-intensity) * 0.8)) 0%,
    rgba(var(--glow-rgb), calc(var(--glow-intensity) * 0.4)) 30%,
    transparent 60%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude; pointer-events: none; z-index: 1; opacity: 1; transition: opacity 0.3s;
}
.glow-card:hover { box-shadow: 0 4px 20px rgba(46,24,78,0.4), 0 0 30px rgba(var(--glow-rgb),0.2); }

/* Spotlight */
.bento-spotlight {
  position: fixed; width: 600px; height: 600px; border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle, rgba(132,0,255,0.12) 0%, rgba(132,0,255,0.05) 20%, rgba(132,0,255,0.02) 40%, transparent 60%);
  z-index: 200; opacity: 0; transform: translate(-50%,-50%); mix-blend-mode: screen; transition: opacity 0.4s;
}

/* Ripple */
.glow-ripple {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 100;
  background: radial-gradient(circle, rgba(var(--glow-rgb),0.4) 0%, rgba(var(--glow-rgb),0.2) 30%, transparent 70%);
  animation: glow-ripple-out 0.7s ease-out forwards;
}
@keyframes glow-ripple-out { from { transform: scale(0); opacity: 1; } to { transform: scale(1); opacity: 0; } }

</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- ── LEFT PANEL ── -->
<div class="left-panel" id="leftPanel">
  <div class="left-header">
    <h2>DAILY TASKS</h2>
    <div class="subtitle">Student Checklist</div>
    <button class="reset-btn" onclick="resetSignoffs()">Clear All Check-ins</button>
  </div>
  <div class="left-scroll" id="leftScroll"></div>
  <div class="left-footer">Tap a task to check in</div>
</div>

<!-- ── RIGHT PANEL ── -->
<div class="right-panel">
  <div class="header">
    <a href="index.html" class="home-link">&larr; Home</a>
    <div class="header-logo">IE</div>
    <div class="header-info">
      <div class="header-title">IE Maker Lab</div>
      <div class="header-subtitle">Student Assistants' Guide</div>
    </div>
    <button class="icon-btn" onclick="clearChat()">Clear</button>
  </div>
  <div class="chat-container" id="chatContainer">
    <div class="welcome-card glow-card" id="welcomeCard">
      <h2>Welcome to <span class="nebula">IE Maker Lab</span></h2>
      <p>Hello <span class="nebula">Student Assistants</span>! Select tasks below.</p>
    </div>
    <div class="main-menu bento-section" id="presetGrid"></div>
  </div>
</div>

<div id="nameModal" class="name-modal-overlay hidden">
  <div class="name-modal" onclick="event.stopPropagation()">
    <h4>Task Check-in</h4>
    <div class="task-preview" id="signoffTaskPreview"></div>
    <input type="text" id="signoffNameInput" placeholder="Enter your name" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSignoff()">Cancel</button>
      <button class="btn-confirm" onclick="confirmSignoff()">Confirm</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
const DEFAULT_TASKS = [
  { id:"d1", tag:"print",   en:"Clean 3D Printer zone, remove waste, check desiccant beads, wash print plates" },
  { id:"d2", tag:"laser",   en:"Clean laser machine workbed and waste materials" },
  { id:"d3", tag:"general", en:"Tidy up and clean workbenches" },
  { id:"d4", tag:"general", en:"Organize tool cabinet and ensure tools are returned" },
  { id:"d5", tag:"admin",   en:"Check Key Management System" },
  { id:"d6", tag:"general", en:"Clean and reorganize display cabinet at WS03 corridor" },
  { id:"d7", tag:"general", en:"Organize Student Maker Corner and project displays" },
  { id:"d8", tag:"inv",     en:"Check and refill component cabinet: screws, nuts, capacitors, etc." },
  { id:"d9", tag:"general", en:"Clean sink area, refill paper towels and soap" },
  { id:"d10",tag:"general", en:"Charge batteries for vacuum, drill, screwdriver, etc." },
];

const DEFAULT_GUIDE = {
  "3dprint-assist": {
    title:"Assist Students with 3D Printing",
    body:"Help students level the print bed, load filament, start prints, and troubleshoot common issues.",
    steps: [
      "Check and level the print bed (bed leveling)",
      "Help load PLA / PETG filament",
      "Import STL, slice with correct settings, start print",
      "Monitor first layer adhesion, pause and adjust if needed",
    ], tag:"coming"
  },
  "3dprint-desiccant": {
    title:"Replace 3D Printer Desiccant Beads",
    body:"Check the desiccant beads in the filament dry box regularly. If they change color, replace or regenerate them.",
    steps: [
      "Open the filament dry box / container",
      "Check bead color (orange = OK, green/dark = saturated)",
      "Remove saturated beads, pour in fresh desiccant",
      "Old beads can be regenerated in microwave (depending on type)",
      "Close container tightly, ensure good seal",
    ], tag:"coming"
  },
  "3dprint-clean": {
    title:"Clean 3D Printer Zone",
    body:"Keep the printer area clean and organized for safe operation.",
    steps: [
      "Remove all failed prints and support material from bed",
      "Wash print plates with water or isopropyl alcohol",
      "Clean filament scraps from floor and table",
      "Wipe printer exterior, touchscreen, and surrounding area",
      "Check desiccant bead status",
      "Properly dispose of waste (PLA can be recycled)",
    ], tag:"daily"
  },
  "laser-assist": {
    title:"Assist Students with Laser Cutter",
    body:"Help students position material, configure power/speed in LightBurn, and operate the laser safely.",
    steps: [
      "Turn on ventilation and water chiller",
      "Help place and align material on honeycomb bed",
      "Set focus using the focus tool",
      "Configure power/speed in LightBurn software",
      "Run a test frame, then start the job",
    ], tag:"coming"
  },
  "laser-clean": {
    title:"Clean Laser Machine and Waste",
    body:"Clean the honeycomb bed, remove debris, empty the scrap bin, and ensure proper ventilation.",
    steps: [
      "Turn off laser, wait for it to cool down",
      "Empty the scrap bin underneath the honeycomb bed",
      "Clean debris from honeycomb bed with brush or vacuum",
      "Gently wipe lens cover with lens tissue",
      "Wipe machine exterior and surrounding work area",
      "Check that exhaust duct is clear",
    ], tag:"daily"
  },
  "3dprint-troubleshoot": {
    title:"3D Printer Troubleshooting",
    body:"Common 3D printer issues and how to resolve them.",
    steps: [
      "Print not sticking to bed — Re-level bed, clean with alcohol, check bed temp",
      "Filament not extruding — Check for clog, preheat nozzle, manually push filament",
      "Stringing / blobs — Adjust retraction settings, lower nozzle temp slightly",
      "Layer shift — Check belt tension, ensure frame is stable",
      "Strange noise — Stop print, check for loose screws or debris in rails",
    ], tag:"warning"
  },
  "laser-troubleshoot": {
    title:"Laser Cutter Troubleshooting",
    body:"Common laser cutter issues and how to resolve them.",
    steps: [
      "Not cutting through — Reduce speed, increase power, check focus",
      "Burn marks — Increase speed, use masking tape, check air assist",
      "Laser not firing — Check water chiller, ensure lid is closed, restart",
      "Uneven engraving — Check bed level, clean lens, ensure material is flat",
    ], tag:"warning"
  },
  "tool-organize": {
    title:"Organize Tool Cabinet",
    body:"Keep the tool cabinet tidy and ensure all tools are in their proper place.",
    steps: [
      "Sort tools by category: hand tools, power tools, measuring tools",
      "Check each tool for damage — report broken tools to supervisor",
      "Wipe tools clean before returning to cabinet",
      "Ensure labels match the tool positions",
    ], tag:"daily"
  },
  "tool-borrow": {
    title:"Borrow / Return Tools",
    body:"Procedure for lending tools to students and checking them back in.",
    steps: [
      "Ask student to show student ID and record their name",
      "Note down tool name, condition, and expected return time",
      "On return, inspect tool for damage or missing parts",
      "Clean and return tool to its designated spot",
    ], tag:"daily"
  },
  "tool-keys": {
    title:"Key Management System",
    body:"Manage lab keys and ensure they are properly tracked.",
    steps: [
      "Check the key cabinet at start and end of each shift",
      "Verify all keys are present and accounted for",
      "Log any key sign-outs with name, time, and purpose",
      "Report missing keys to supervisor immediately",
    ], tag:"daily"
  },
  "tool-components": {
    title:"Component Cabinet",

let signoffs = {};
function loadSignoffs() { try { const r=localStorage.getItem('maker_lab_signoffs'); if(r) signoffs=JSON.parse(r); } catch(e) { signoffs={}; } }

// ═══════════════════════════════════════
//  IndexedDB helpers for PDF uploads
// ═══════════════════════════════════════
const IDB_DB = 'maker_lab_uploads', IDB_STORE = 'pdfs';
function idbOpen() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error('IndexedDB not available')); return; }
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE, { keyPath: 'id' }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbRetrieve(id) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly'), store = tx.objectStore(IDB_STORE), req = store.get(id);
    req.onsuccess = () => { db.close(); resolve(req.result); };
    req.onerror = () => { db.close(); reject(req.error); };
  }));
}

const chatEl = document.getElementById('chatContainer');

// ═══════════════════════════════════════

function renderLeftPanel() {
  let html = '';
  TASKS.forEach(t => {
    const names = getSignoffs(t.id);
    const done = names.length > 0;
    html += `<div class="cl-item${done?' done':''}" id="left-${t.id}" onclick="openSignoff('${t.id}')">
      <div class="cl-check">${done?'&#10003;':''}</div>
      <div class="cl-text">
        <div class="cl-title">${escapeHtml(t.en)}</div>
        ${names.length ? `<div class="cl-signoffs">${names.map(n=>`<span class="cl-signoff-chip">${escapeHtml(n.name)}</span>`).join('')}</div>` : ''}
      </div>

  });
  leftScroll.innerHTML = html;
}

//  SIGNOFF MODAL

let pendingSignoffId = null;
function openSignoff(id) {
  pendingSignoffId = id;
  const t = TASKS.find(x => x.id === id);
  document.getElementById('signoffTaskPreview').textContent = t ? t.en : id;
  document.getElementById('signoffNameInput').value = '';
  document.getElementById('nameModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('signoffNameInput').focus(), 100);
}
function closeSignoff() { document.getElementById('nameModal').classList.add('hidden'); pendingSignoffId = null; }
function confirmSignoff() {
  const name = document.getElementById('signoffNameInput').value.trim();
  if (!name || !pendingSignoffId) return;
  if (!signoffs[pendingSignoffId]) signoffs[pendingSignoffId] = [];
  signoffs[pendingSignoffId].push({ name, time: new Date().toISOString() });
  saveSignoffs(); renderLeftPanel(); closeSignoff();
  showToast(name + ' checked in!');
}
function resetSignoffs() {
  if (!confirm('Clear all check-ins for today?')) return;
  signoffs = {}; saveSignoffs(); renderLeftPanel();
  showToast('All tasks cleared!');
}
document.getElementById('nameModal').addEventListener('click', closeSignoff);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeSignoff(); });

//  RIGHT PANEL — Main Menu
// ═══════════════════════════════════════
function renderMainMenu() {
  presetEl.innerHTML = MAIN_MENU.map(m => `
    <div class="menu-section glow-card">
      <div class="ms-header">
        <div>
          <div class="ms-title">${m.title}</div>
          <div class="ms-sub">${m.subtitle}</div>
        </div>
      </div>
      <div class="ms-items">
        ${m.subs.map(s => {
          if (s.pdfId) {
            return `<button class="ms-item" data-pdf-id="${s.pdfId}" data-pdf-name="${escapeHtml(s.pdfName||'')}" onclick="openPdf(this)">${s.en}</button>`;
          } else if (s.pdf) {
            return `<button class="ms-item" data-pdf="${s.pdf}" onclick="openPdf(this)">${s.en}</button>`;
          } else if (s.guide) {
            return `<button class="ms-item" data-guide="${encodeURIComponent(JSON.stringify(s.guide))}" onclick="showGuideInline(this)">${s.en}</button>`;
          } else {
            return `<button class="ms-item" data-q="${s.q||''}" onclick="sendSubItem(this)">${s.en}</button>`;
          }
        }).join('')}
      </div>
    </div>
  `).join('');
}

function showGuideInline(btn){
  const guide=JSON.parse(decodeURIComponent(btn.dataset.guide));
  const html=buildGuideHTML(guide);
  if(welcomeEl)welcomeEl.style.display='none';
  addUserBubble(btn.textContent.trim());saveHistory();chatEl.scrollTop=chatEl.scrollHeight;
  if(html){addBotBubble(html+`<div class="feedback-row">Was this helpful? <button class="feedback-btn" onclick="feedback(this,'yes')">Yes</button><button class="feedback-btn" onclick="feedback(this,'no')">No</button></div>`);}
  saveHistory();chatEl.scrollTop=chatEl.scrollHeight;
}

function buildGuideHTML(entry){
  if(!entry)return null;
  let html=`<div class="guide-card glow-card"><div class="g-title">${entry.title||''}</div>`;
  if(entry.body)html+=`<div style="color:var(--text-secondary);font-size:14px;line-height:1.6;white-space:pre-line;">${entry.body}</div>`;
  if(entry.steps&&entry.steps.length){
    html+=entry.steps.map((s,i)=>`<div class="g-row"><span class="g-num">${i+1}</span><div style="flex:1;font-weight:500;">${escapeHtml(s)}</div></div>`).join('');
  }
  if(entry.tag){
    html+=`<span class="tag-chip ${entry.tag}">${entry.tag==='coming'?'Coming Soon':entry.tag==='warning'?'Troubleshooting':'Daily'}</span>`;
  }
  html+=`</div>`;
  return html;
}

// ═══════════════════════════════════════
//  SEND / PDF
// ═══════════════════════════════════════
async function openPdf(btn) {
  const pdfPath = btn.dataset.pdf;
  const pdfId = btn.dataset.pdfId;

  if (pdfId) {
    try {
      const record = await idbRetrieve(pdfId);
      if (record && record.blob) {
        const url = URL.createObjectURL(record.blob);
        const w = window.open(url, '_blank');
        if (w) { setTimeout(() => URL.revokeObjectURL(url), 60000); }
        else { URL.revokeObjectURL(url); showToast('Popup blocked. Please allow popups for this site.'); }
      } else {
        showToast('PDF not found in storage. It may have been deleted.');
      }
    } catch (e) { showToast('Failed to load PDF: ' + e.message); }
  } else if (pdfPath) {
    window.open(pdfPath, '_blank');
  }
}
function sendSubItem(btn) {
  const label = btn.textContent.trim();
  doSend(label, btn.dataset.q);
}
async function doSend(label, query) {
  if (!label || !query) return;
  if (welcomeEl) welcomeEl.style.display = 'none';
  addUserBubble(label); saveHistory(); chatEl.scrollTop = chatEl.scrollHeight;
  showTyping();
  await new Promise(r => setTimeout(r, 350 + Math.random() * 350));
  hideTyping();
  const html = buildResponse(query);
  if (html) {
    addBotBubble(html + `<div class="feedback-row">Was this helpful? <button class="feedback-btn" onclick="feedback(this,'yes')">Yes</button><button class="feedback-btn" onclick="feedback(this,'no')">No</button></div>`);
  } else {
    addBotBubble(`No matching guide found for "<b>${escapeHtml(label)}</b>". Try a different option.`);
  }
  saveHistory(); chatEl.scrollTop = chatEl.scrollHeight;
}

function buildResponse(key) {
  const entry = GUIDE[key];
  if (!entry) return null;
  let html = `<div class="guide-card glow-card"><div class="g-title">${entry.title}</div>`;
  if (entry.body) html += `<div style="color:var(--text-secondary);font-size:14px;line-height:1.6;white-space:pre-line;">${entry.body}</div>`;
  if (entry.steps) {
    html += entry.steps.map((s, i) => `<div class="g-row"><span class="g-num">${i+1}</span><div style="flex:1;font-weight:500;">${s}</div></div>`).join('');
  }
  if (entry.links) {
    html += entry.links.map(lk => {
      const e = GUIDE[lk]; if (!e) return '';
      return `<button class="ms-item" data-q="${lk}" onclick="sendSubItem(this)" style="margin-top:6px;">${e.title}</button>`;
    }).join('');
  }
  if (entry.equipment) {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;">';
    html += entry.equipment.map(eq => `<button class="ms-item" data-q="${eq.q}" onclick="sendSubItem(this)" style="font-size:13px;padding:10px;">${eq.en}</button>`).join('');
    html += '</div>';
  }
  if (entry.tag) {
    html += `<span class="tag-chip ${entry.tag}">${entry.tag==='coming'?'Coming Soon':entry.tag==='warning'?'Troubleshooting':'Daily'}</span>`;
  }
  html += `</div>`;
  return html;
}

function feedback(btn, type) {
  const row = btn.parentElement;
  row.querySelectorAll('.feedback-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

function clearChat() {
  if (confirm('Clear all conversations?')) {
    chatEl.querySelectorAll('.bubble-row').forEach(r => r.remove());

    localStorage.removeItem('maker_lab_history');

}

const HIST_KEY = 'maker_lab_history', HIST_TS = 'maker_lab_hist_ts';
function saveHistory() {

function loadHistory() {

    if (Date.now()-ts < 3600000) { const h = localStorage.getItem(HIST_KEY); if (h) { chatEl.innerHTML = h; return; } }
  } catch(e) {}
}

// ── MagicBento: border glow + spotlight + ripple ──
(function(){
  const GLOW_RGB = '132,0,255';
  const SPOTLIGHT_RADIUS = 300;

  // --- Spotlight ---
  const spotlight = document.createElement('div');
  spotlight.className = 'bento-spotlight';
  document.body.appendChild(spotlight);

  // --- Glow tracking ---
  function updateGlow(card, mx, my) {
    const r = card.getBoundingClientRect();
    const rx = ((mx - r.left) / r.width) * 100;
    const ry = ((my - r.top) / r.height) * 100;
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const dist = Math.hypot(mx - cx, my - cy);
    const proximity = SPOTLIGHT_RADIUS * 0.5;
    const fadeDist = SPOTLIGHT_RADIUS * 0.75;
    let intensity = 0;
    if (dist <= proximity) intensity = 1;
    else if (dist <= fadeDist) intensity = (fadeDist - dist) / (fadeDist - proximity);
    card.style.setProperty('--glow-x', rx + '%');
    card.style.setProperty('--glow-y', ry + '%');
    card.style.setProperty('--glow-intensity', intensity);
    card.style.setProperty('--glow-rgb', GLOW_RGB);
    return intensity;
  }

  document.addEventListener('mousemove', function(e) {
    spotlight.style.left = e.clientX + 'px';
    spotlight.style.top = e.clientY + 'px';
    spotlight.style.opacity = '0.7';
    document.querySelectorAll('.glow-card').forEach(c => {
      updateGlow(c, e.clientX, e.clientY);
    });
  });

  document.addEventListener('mouseleave', function() {
    spotlight.style.opacity = '0';
    document.querySelectorAll('.glow-card').forEach(c => { c.style.setProperty('--glow-intensity', '0'); });
  });

  // --- Ripple on click ---
  document.addEventListener('click', function(e) {
    const card = e.target.closest('.glow-card');
    if (!card) return;
    const r = card.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const maxDist = Math.max(
      Math.hypot(x, y), Math.hypot(x - r.width, y),
      Math.hypot(x, y - r.height), Math.hypot(x - r.width, y - r.height)
    );
    const ripple = document.createElement('div');
    ripple.className = 'glow-ripple';
    ripple.style.cssText = `width:${maxDist*2}px;height:${maxDist*2}px;left:${x-maxDist}px;top:${y-maxDist}px;`;
    ripple.style.setProperty('--glow-rgb', GLOW_RGB);
    card.appendChild(ripple);
    ripple.addEventListener('animationend', function(){ ripple.remove(); });
  });
})();
