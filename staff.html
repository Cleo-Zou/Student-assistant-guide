<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff · Content Editor · IE Maker Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b; --surface: #111113;
    --card: rgba(255,255,255,0.025); --card-hover: rgba(255,255,255,0.045);
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.13);
    --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --success: #22c55e; --warning: #eab308; --danger: #ef4444;
    --radius: 8px; --radius-sm: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  select option { background:#18181b; color:#fafafa; }

  /* Universal blue glow on all interactive elements */
  button, .home-link, .btn, .btn-sm, .editor-tab, .guide-list-item, .me-sub-item, .btn-add-sm, .cl-item, .step-del {
    position: relative; isolation: isolate;
  }
  button::before, .home-link::before, .btn::before, .btn-sm::before, .editor-tab::before,
  .guide-list-item::before, .me-sub-item::before, .btn-add-sm::before, .cl-item::before, .step-del::before {
    content: ''; position: absolute; inset: -2px; border-radius: inherit;
    background: rgba(59,130,246,0); filter: blur(8px); z-index: -1;
    transition: background 0.35s ease;
  }
  button:hover::before, .home-link:hover::before, .btn:hover::before, .btn-sm:hover::before,
  .editor-tab:hover::before, .guide-list-item:hover::before, .me-sub-item:hover::before,
  .btn-add-sm:hover::before, .cl-item:hover::before, .step-del:hover::before {
    background: rgba(59,130,246,0.22);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; overflow: hidden;
    font-size: 15px; letter-spacing: -0.01em;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 30% 50%, black 30%, transparent 70%);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    position: relative; z-index: 1; width: 380px; min-width: 380px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100dvh;
  }
  .left-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; text-align:center; }
  .left-header h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #818cf8, #6366f1, #3b82f6, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .left-header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .left-header-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-sm {
    padding: 8px 16px; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
    font-family: inherit; transition: all .15s;
  }
  .btn-sm:hover { background: rgba(255,255,255,0.04); color: var(--text); border-color: var(--border-hover); }
  .btn-sm.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm.accent:hover { background: var(--accent-hover); }
  .btn-sm.danger { color: var(--danger); }
  .btn-sm.danger:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }

  .left-scroll { flex:1; overflow-y: auto; padding: 10px 8px; }
  .left-scroll::-webkit-scrollbar { width: 4px; }
  .left-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  .task-section { margin-bottom: 4px; }
  .task-section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); padding: 10px 14px 6px; display: flex; align-items: center; gap: 7px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-print{background:var(--accent);}.dot-laser{background:var(--warning);}.dot-general{background:var(--text-muted);}.dot-admin{background:var(--danger);}.dot-inv{background:var(--success);}
  .cl-item {
    padding: 12px 14px; border-radius: 6px; cursor: pointer; transition: all .12s;
    display: flex; align-items: flex-start; gap: 10px; border: 1px solid transparent;
  }
  .cl-item:hover { background: var(--card-hover); }
  .cl-item.editing { background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.15); }
  .cl-item.done .cl-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cl-check { width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .15s; }
  .cl-text { flex:1; min-width: 0; font-size: 14px; line-height: 1.55; }
  .cl-signoffs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .cl-signoff-chip { font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.06);color:var(--text-muted);font-weight:500; }
  .cl-edit-btn { font-size:14px;color:var(--text-muted);cursor:pointer;flex-shrink:0;opacity:0;transition:opacity .15s;background:none;border:none;padding:2px 6px; }
  .cl-item:hover .cl-edit-btn { opacity: 1; }
  .cl-edit-btn:hover { color: var(--accent); }
  .task-editor-card {
    margin:4px 10px 10px;padding:18px;background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);animation:fadeIn .15s ease;
  }
  .task-editor-card textarea {
    width:100%;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);
    border-radius:5px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;min-height:60px;
    outline:none;transition:border-color .15s;line-height:1.5;
  }
  .task-editor-card textarea:focus { border-color: var(--accent); }
  .task-editor-card .editor-actions { display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap; }
  .task-editor-card select { padding:7px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;outline:none; }
  .left-footer { padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0;font-size:12px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center; }

  /* ── RIGHT PANEL ── */
  .right-panel { position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg); }
  .header { display:flex;align-items:center;gap:16px;padding:16px 24px;flex-shrink:0; }
  .header .home-link { font-family:'JetBrains Mono',monospace; font-size:13px; color:#d4d4d8; text-decoration:none; letter-spacing:0.04em; padding:6px 12px; border-radius:5px; border:1px solid rgba(139,92,246,0.25); }
  .header .home-link:hover { color:#ffffff; border-color:rgba(139,92,246,0.6); background:rgba(139,92,246,0.08); }
  .header-logo { width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0; }
  .header-info { flex:1;min-width:0; }
  .header-curved-loop { flex:1;min-width:0; height:48px; display:flex; align-items:center; overflow:hidden; cursor:grab; user-select:none; -webkit-user-select:none; margin-left:2px; margin-right:6px; padding-left:2px; }
  .header-curved-loop:active { cursor:grabbing; }
  .header-curved-loop .clo-svg { width:100%; height:100%; overflow:visible; display:block; }
  .header-curved-loop .clo-text { font-size:17px; font-weight:700; letter-spacing:0.06em; }
  .btn { padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);font-family:inherit;transition:all .15s;background:transparent;color:var(--text-secondary);white-space:nowrap; }
  .btn:hover { background:rgba(255,255,255,0.04);color:var(--text);border-color:var(--border-hover); }
  .btn.primary { background:var(--accent);color:#fff;border-color:var(--accent); }
  .btn.primary:hover { background:var(--accent-hover); }
  .btn.primary.dirty { box-shadow:0 0 14px rgba(234,179,8,0.5); }

  .editor-tabs { display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 24px; }
  .editor-tab { padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none; }
  .editor-tab:hover { color:var(--text); }
  .editor-tab.active { color:var(--accent);border-bottom-color:var(--accent); }
  .editor-body { flex:1;overflow-y:auto;padding:24px; }
  .editor-body::-webkit-scrollbar { width:5px; }
  .editor-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08);border-radius:4px; }

  .guide-list-item { padding:14px 16px;border-radius:6px;cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:12px; }
  .guide-list-item:hover { background:var(--card-hover); }
  .guide-list-item.active { background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.2); }
  .guide-list-item .g-key { font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);min-width:160px; }
  .guide-list-item .g-title-preview { font-weight:600;font-size:14px;flex:1; }

  .menu-editor-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px; }
  .menu-editor-section { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px; }
  .menu-editor-section .me-title { font-size:18px;font-weight:700;margin-bottom:3px;cursor:pointer;text-align:center; }
  .menu-editor-section .me-subtitle { font-size:12px;color:var(--text-muted);margin-bottom:14px;cursor:pointer;text-align:center; }
  .me-sub-item { padding:10px 12px;border-radius:5px;margin-bottom:5px;font-size:14px;cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:8px;transition:all .12s;font-weight:500; }
  .me-sub-item:hover { background:rgba(255,255,255,0.03);border-color:var(--border); }
  .me-sub-item.active { background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.2); }
  .me-sub-item .me-type { font-size:10px;padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,0.06);color:var(--text-muted); }
  .btn-add-sm { width:100%;padding:10px;margin-top:10px;background:transparent;border:1px dashed var(--border);color:var(--text-muted);border-radius:5px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s; }
  .btn-add-sm:hover { border-color:var(--accent);color:var(--accent); }

  .form-section { margin-bottom:22px; }
  .form-section-title { font-size:14px;font-weight:700;margin-bottom:12px;text-align:center; }
  .field-label { font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px; }
  .field-input,.field-textarea { width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s; }
  .field-input:focus,.field-textarea:focus { border-color:var(--accent); }
  .field-textarea { resize:vertical;min-height:80px;line-height:1.55; }
  .field-select { padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;outline:none; }
  .step-row { display:flex;gap:10px;margin-bottom:10px;padding:12px;background:rgba(255,255,255,0.015);border-radius:5px;border:1px solid transparent;align-items:flex-start; }
  .step-row:hover { border-color:var(--border); }
  .step-num { width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0; }
  .step-inputs { flex:1; }
  .step-inputs input { width:100%;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:6px; }
  .step-inputs input:focus { border-color:var(--accent); }
  .step-del { background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:2px 8px;transition:color .15s; }
  .step-del:hover { color:var(--danger); }
  .empty-state { display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:16px;text-align:center;line-height:1.7; }
  .toast { position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#18181b;border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;pointer-events:none;display:none; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px) translateX(-50%);} to{opacity:1;transform:translateY(0) translateX(-50%);} }
  @keyframes fadeOut { to{opacity:0;transform:translateY(-6px) translateX(-50%);} }

  /* ── PDF Upload ── */
  .pdf-upload-box {
    position:relative;border:2px dashed var(--border);border-radius:var(--radius-sm);
    padding:14px 40px 14px 16px;cursor:pointer;transition:all .2s ease;
    background:rgba(255,255,255,0.01);min-height:48px;
    display:flex;align-items:center;gap:8px;
  }
  .pdf-upload-box:hover{border-color:var(--accent);background:rgba(59,130,246,0.04);}
  .tut-toggle-btn{
    flex:1;padding:9px 14px;font-size:12px;font-family:inherit;font-weight:600;
    cursor:pointer;background:transparent;border:none;color:var(--text-muted);transition:all .15s;
  }
  .tut-toggle-btn:hover{color:var(--text);background:rgba(255,255,255,0.03);}
  .tut-toggle-btn.active{background:var(--accent);color:#fff;}

  @media (max-width:860px) {
    body{flex-direction:column;}
    .left-panel{width:100%;min-width:0;max-height:40vh;border-right:none;border-bottom:1px solid var(--border);}
    .right-panel{height:auto;flex:1;}
    .menu-editor-grid{grid-template-columns:1fr;}
  }
/* ── MagicBento border glow ── */
.glow-card {
  position: relative; overflow: hidden;
  --glow-x: 50%; --glow-y: 50%; --glow-intensity: 0; --glow-rgb: 132,0,255;
}
.glow-card::after {
  content: ''; position: absolute; inset: 0; padding: 2px; border-radius: inherit;
  background: radial-gradient(300px circle at var(--glow-x) var(--glow-y),
    rgba(var(--glow-rgb), calc(var(--glow-intensity) * 0.8)) 0%,
    rgba(var(--glow-rgb), calc(var(--glow-intensity) * 0.4)) 30%,
    transparent 60%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude; pointer-events: none; z-index: 1; opacity: 1; transition: opacity 0.3s;
}
.glow-card:hover { box-shadow: 0 4px 20px rgba(46,24,78,0.4), 0 0 30px rgba(var(--glow-rgb),0.2); }

/* Spotlight */
.bento-spotlight {
  position: fixed; width: 600px; height: 600px; border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle, rgba(132,0,255,0.12) 0%, rgba(132,0,255,0.05) 20%, rgba(132,0,255,0.02) 40%, transparent 60%);
  z-index: 200; opacity: 0; transform: translate(-50%,-50%); mix-blend-mode: screen; transition: opacity 0.4s;
}

/* Ripple */
.glow-ripple {
  position: absolute; border-radius: 50%; pointer-events: none; z-index: 100;
  background: radial-gradient(circle, rgba(var(--glow-rgb),0.4) 0%, rgba(var(--glow-rgb),0.2) 30%, transparent 70%);
  animation: glow-ripple-out 0.7s ease-out forwards;
}
@keyframes glow-ripple-out { from { transform: scale(0); opacity: 1; } to { transform: scale(1); opacity: 0; } }

</style>
</head>

<div class="bg-grid"></div>

<!-- ── LEFT PANEL ── -->
<div class="left-panel">
  <div class="left-header">
    <h2>DAILY TASKS</h2>
    <div class="subtitle">Staff Editor — click a task to edit</div>
    <div class="left-header-actions">
      <button class="btn-sm accent" onclick="addNewTask()">+ Add Task</button>

  </div>
  <div class="left-scroll" id="leftScroll"></div>

<!-- ── RIGHT PANEL ── -->
<div class="right-panel">
  <div class="header">
    <a href="index.html" class="home-link">&larr; Home</a>
    <div class="header-curved-loop" id="headerCurvedLoop">
      <svg class="clo-svg" viewBox="0 0 800 48">
        <defs>
          <filter id="cloGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
            <feFlood flood-color="#1e40ff" flood-opacity="1" result="color1"/>
            <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
            <feFlood flood-color="#0018ff" flood-opacity="0.9" result="color2"/>
            <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>
            <feMerge>
              <feMergeNode in="glow2"/>
              <feMergeNode in="glow1"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <path id="headerCurve" d="M-40,24 Q400,64 840,24" fill="none" stroke="transparent"/>
        </defs>
        <text xml:space="preserve" class="clo-text" fill="#ffffff" filter="url(#cloGlow)">
          <textPath href="#headerCurve" startOffset="0" xml:space="preserve"></textPath>
        </text>
      </svg>
    </div>
    <button class="btn primary" id="saveAllBtn" onclick="saveAll()">Save All</button>
  </div>
  <div class="editor-body" id="editorBody">
    <div class="empty-state">Select a tab above to start editing.</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── Curved Loop Header Animation ──
(function(){
  const c = document.getElementById('headerCurvedLoop');
  if(!c) return;
  const tp = c.querySelector('textPath');
  const tx = "IE ✦ MAKER ✦ LAB ✦ Staff ✦ Content ✦ Editor ✦  ";
  const spd = 1.2;
  let spacing=0, offset=0, dir=-1, drag=false, lx=0, vel=0;

  const ns = 'http://www.w3.org/2000/svg';
  const m = document.createElementNS(ns, 'text');
  m.setAttribute('xml:space','preserve');
  m.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;';
  m.textContent = tx;
  c.querySelector('svg').appendChild(m);
  spacing = m.getComputedTextLength();
  m.remove();

  const n = Math.ceil(1000/spacing)+2;
  tp.textContent = tx.repeat(n);
  offset = -spacing;
  tp.setAttribute('startOffset', offset+'px');

  function step(){
    if(!drag){
      offset += dir*spd;
      if(offset <= -spacing) offset += spacing;
      if(offset > 0) offset -= spacing;
      tp.setAttribute('startOffset', offset+'px');
    }
    requestAnimationFrame(step);
  }

  c.addEventListener('pointerdown', e => {
    drag=true; lx=e.clientX; vel=0;
    c.setPointerCapture(e.pointerId);
  });
  c.addEventListener('pointermove', e => {
    if(!drag) return;
    vel = e.clientX-lx; lx=e.clientX;
    offset += vel;
    if(offset <= -spacing) offset += spacing;
    if(offset > 0) offset -= spacing;
    tp.setAttribute('startOffset', offset+'px');
  });
  const up = () => { if(drag){ drag=false; dir=vel>0?1:-1; } };
  c.addEventListener('pointerup', up);
  c.addEventListener('pointerleave', up);

  requestAnimationFrame(step);
})();

function migrateGuide(g) {
  if (g.en && g.en.title !== undefined) { g.title = g.en.title; g.body = g.en.body || ''; delete g.en; delete g.tc; delete g.sc; }
  if (g.steps && g.steps.length && typeof g.steps[0] === 'object') {
    g.steps = g.steps.map(s => s.en || s.tc || Object.values(s)[0] || '');
  }
  if (g.equipment && g.equipment.length && g.equipment[0].tc !== undefined) { g.equipment.forEach(e => { if (e.tc) delete e.tc; if (e.sc) delete e.sc; }); }
  return g;
}

const IDB_DB='maker_lab_uploads', IDB_STORE='pdfs';
function idbOpen(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB not available'));return;}
    const req=indexedDB.open(IDB_DB,1);
    req.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE,{keyPath:'id'});};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function idbStore(id,name,blob,size){
  return idbOpen().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite'),store=tx.objectStore(IDB_STORE);
    store.put({id,name,blob,size,mime:'application/pdf'});
    tx.oncomplete=()=>{db.close();resolve();};
    tx.onerror=()=>{db.close();reject(tx.error);};
  }));
}
function idbRetrieve(id){
  return idbOpen().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readonly'),store=tx.objectStore(IDB_STORE),req=store.get(id);
    req.onsuccess=()=>{db.close();resolve(req.result);};
    req.onerror=()=>{db.close();reject(req.error);};
  }));
}
function idbDelete(id){
  return idbOpen().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite'),store=tx.objectStore(IDB_STORE);
    store.delete(id);tx.oncomplete=()=>{db.close();resolve();};
    tx.onerror=()=>{db.close();reject(tx.error);};
  }));
}
function generatePdfId(){return 'pdf_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}
function formatFileSize(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return (bytes/1024).toFixed(1)+' KB';
  return (bytes/1048576).toFixed(1)+' MB';
}

async function saveSubItem(){
  const {mi,si}=state.selectedSubItem,s=state.menu[mi].subs[si];
  s.en=document.getElementById('si-en')?.value||'';
  delete s.q;

  if(menuSubMode==='guide'){
    // Guide mode — clear PDF, save guide from DOM
    if(s.pdfId){try{await idbDelete(s.pdfId);}catch(e){}}
    delete s.pdfId;delete s.pdfName;delete s.pdf;
    if(s._oldPdfId){try{await idbDelete(s._oldPdfId);}catch(e){} delete s._oldPdfId;}
    pendingMenuPdf=null;

    syncMenuFormToState();
    if(!s.guide||(!s.guide.title&&!s.guide.body&&(!s.guide.steps||!s.guide.steps.length))){
      delete s.guide;
    }
  }else{
    // PDF mode (default) — clear guide, save PDF
    delete s.guide;
    if(s._oldPdfId){try{await idbDelete(s._oldPdfId);}catch(e){} delete s._oldPdfId;}
    if(pendingMenuPdf){
      if(s.pdfId){try{await idbDelete(s.pdfId);}catch(e){}}
      try{
        await idbStore(pendingMenuPdf.id,pendingMenuPdf.name,pendingMenuPdf.blob,pendingMenuPdf.size);
        delete s.pdf;s.pdfId=pendingMenuPdf.id;s.pdfName=pendingMenuPdf.name;
        pendingMenuPdf=null;
      }catch(e){showToast('Failed to store PDF: '+e.message);return;}
    }else if(!s.pdfId&&!s.pdf){
      showToast('Please select a PDF file first.');return;
    }
  }

  menuSubMode=null;
  markDirty();showToast('Sub-item saved.');renderEditorBody();
}

  state.menu[mi].subs.splice(si,1);
  state.selectedSubItem=null;pendingMenuPdf=null;

}

function renderGuideEditor(){
  const keys=Object.keys(state.guide);
  let h=`<div style="display:flex;gap:18px;height:100%;"><div style="width:300px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);padding-right:12px;">`;
  h+=`<button class="btn-add-sm" onclick="addNewGuide()" style="margin-bottom:12px;">+ New Guide</button>`;
  keys.forEach(k=>{
    const g=state.guide[k],active=state.selectedGuide===k;
    h+=`<div class="guide-list-item${active?' active':''}" onclick="selectGuide('${k}')"><span class="g-title-preview">${g.title||k}</span></div>`;
  });
  h+=`</div><div style="flex:1;overflow-y:auto;">`;
  if(state.selectedGuide&&state.guide[state.selectedGuide])h+=renderGuideDetail(state.selectedGuide,state.guide[state.selectedGuide]);
  else h+=`<div class="empty-state">Select a guide to edit.</div>`;
  h+=`</div></div>`;editorBody.innerHTML=h;
}
function renderGuideDetail(k,g){
  const hasSteps=g.steps&&Array.isArray(g.steps),hasLinks=g.links,hasEquip=g.equipment;
  let h=`<div class="form-section-title" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);margin-bottom:18px;">${esc(k)}</div>`;
  h+=`<div class="form-section"><div class="field-label">Title</div><input class="field-input" id="g-title" value="${escAttr(g.title||'')}" oninput="markDirty()"></div>`;
  h+=`<div class="form-section"><div class="field-label">Body</div><textarea class="field-textarea" id="g-body" oninput="markDirty()">${esc(g.body||'')}</textarea></div>`;
  h+=`<div class="form-section"><div class="field-label">Tag</div><select class="field-select" id="g-tag" style="max-width:200px;" onchange="markDirty()"><option value="" ${!g.tag?'selected':''}>(none)</option><option value="coming" ${g.tag==='coming'?'selected':''}>coming</option><option value="daily" ${g.tag==='daily'?'selected':''}>daily</option><option value="warning" ${g.tag==='warning'?'selected':''}>warning</option></select></div>`;
  if(hasSteps){
    h+=`<div class="form-section"><div class="form-section-title">Steps</div>`;
    g.steps.forEach((s,i)=>{h+=`<div class="step-row"><span class="step-num">${i+1}</span><div class="step-inputs"><input value="${escAttr(s)}" id="st-${i}" oninput="markDirty()" placeholder="Step text"></div><button class="step-del" onclick="deleteStep(${i})">&times;</button></div>`;});
    h+=`<button class="btn-add-sm" onclick="addStep()">+ Add Step</button></div>`;
  }
  if(hasLinks){
    h+=`<div class="form-section"><div class="form-section-title">Links</div>`;
    g.links.forEach((lk,i)=>{h+=`<div style="display:flex;gap:8px;margin-bottom:5px;align-items:center;"><input class="field-input" value="${escAttr(lk)}" id="lk-${i}" oninput="markDirty()" style="flex:1;"><button class="step-del" onclick="deleteLink(${i})">&times;</button></div>`;});
    h+=`<button class="btn-add-sm" onclick="addLink()">+ Add Link</button></div>`;
  }
  if(hasEquip){
    h+=`<div class="form-section"><div class="form-section-title">Equipment</div>`;
    g.equipment.forEach((eq,i)=>{h+=`<div class="step-row"><span class="step-num">${i+1}</span><div class="step-inputs"><input value="${escAttr(eq.en||'')}" id="eq-${i}-en" oninput="markDirty()" placeholder="Name"><input value="${escAttr(eq.q||'')}" id="eq-${i}-q" oninput="markDirty()" placeholder="Query key" style="margin-top:6px;"></div><button class="step-del" onclick="deleteEquip(${i})">&times;</button></div>`;});
    h+=`<button class="btn-add-sm" onclick="addEquip()">+ Add Equipment</button></div>`;
  }
  h+=`<div style="margin-top:20px;display:flex;gap:10px;"><button class="btn-sm accent" onclick="saveGuideDetail('${k}')">Save</button><button class="btn-sm danger" onclick="deleteGuide('${k}')">Delete</button></div>`;
  return h;
}
function selectGuide(k){state.selectedGuide=k;renderEditorBody();}
function saveGuideDetail(k){
  const g=state.guide[k];
  g.title=document.getElementById('g-title')?.value||'';
  g.body=document.getElementById('g-body')?.value||'';
  const tagVal=document.getElementById('g-tag')?.value||'';if(tagVal)g.tag=tagVal;else delete g.tag;
  if(g.steps)g.steps=g.steps.map((_,i)=>document.getElementById(`st-${i}`)?.value||'');
  if(g.links)g.links=g.links.map((_,i)=>document.getElementById(`lk-${i}`)?.value||'').filter(Boolean);
  if(g.equipment)g.equipment.forEach((eq,i)=>{eq.en=document.getElementById(`eq-${i}-en`)?.value||'';eq.q=document.getElementById(`eq-${i}-q`)?.value||'';});
  markDirty();showToast(`Guide "${k}" saved.`);
}
function addStep(){const g=state.guide[state.selectedGuide];if(!g.steps)g.steps=[];g.steps.push('');markDirty();renderEditorBody();}
function deleteStep(i){state.guide[state.selectedGuide].steps.splice(i,1);markDirty();renderEditorBody();}
function addLink(){const g=state.guide[state.selectedGuide];if(!g.links)g.links=[];g.links.push('');markDirty();renderEditorBody();}
function deleteLink(i){state.guide[state.selectedGuide].links.splice(i,1);markDirty();renderEditorBody();}
function addEquip(){const g=state.guide[state.selectedGuide];if(!g.equipment)g.equipment=[];g.equipment.push({en:'',q:''});markDirty();renderEditorBody();}
function deleteEquip(i){state.guide[state.selectedGuide].equipment.splice(i,1);markDirty();renderEditorBody();}
function addNewGuide(){
  const key=prompt('Enter new guide key:');if(!key)return;
  if(state.guide[key]){alert('That key already exists.');return;}
  state.guide[key]={title:'',body:'',steps:[],tag:'coming'};state.selectedGuide=key;markDirty();renderEditorBody();
}
function deleteGuide(k){if(!confirm(`Delete "${k}"?`))return;delete state.guide[k];state.selectedGuide=null;markDirty();renderEditorBody();}

function saveAll(){
  saveToStorage('maker_lab_staff_tasks',state.tasks);
  saveToStorage('maker_lab_staff_guide',state.guide);
  saveToStorage('maker_lab_staff_menu',state.menu);
  state.dirty=false;saveAllBtn.classList.remove('dirty');showToast('All changes saved!');
}
async function resetAll(){
  if(!confirm('Reset ALL data to defaults?'))return;
  try{const db=await idbOpen();const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).clear();db.close();}catch(e){}
  state.tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
  state.guide=JSON.parse(JSON.stringify(DEFAULT_GUIDE));
  state.menu=JSON.parse(JSON.stringify(DEFAULT_MAIN_MENU));
  state.editingTaskId=null;state.selectedSubItem=null;pendingMenuPdf=null;menuSubMode=null;
  markDirty();renderLeftPanel();renderEditorBody();showToast('Reset. Click Save All to persist.');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAll();}});
window.addEventListener('beforeunload',e=>{if(state.dirty){e.preventDefault();e.returnValue='';}});
window.addEventListener('storage',e=>{if(e.key==='maker_lab_signoffs'){loadSignoffs();renderLeftPanel();}});

switchEditorTab('menu');
renderLeftPanel();
// ── MagicBento: border glow + spotlight + ripple ──
(function(){
  const GLOW_RGB = '132,0,255';
  const SPOTLIGHT_RADIUS = 300;

  // --- Spotlight ---
  const spotlight = document.createElement('div');
  spotlight.className = 'bento-spotlight';
  document.body.appendChild(spotlight);

  // --- Glow tracking ---
  function updateGlow(card, mx, my) {
    const r = card.getBoundingClientRect();
    const rx = ((mx - r.left) / r.width) * 100;
    const ry = ((my - r.top) / r.height) * 100;
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const dist = Math.hypot(mx - cx, my - cy);
    const proximity = SPOTLIGHT_RADIUS * 0.5;
    const fadeDist = SPOTLIGHT_RADIUS * 0.75;
    let intensity = 0;
    if (dist <= proximity) intensity = 1;
    else if (dist <= fadeDist) intensity = (fadeDist - dist) / (fadeDist - proximity);
    card.style.setProperty('--glow-x', rx + '%');
    card.style.setProperty('--glow-y', ry + '%');
    card.style.setProperty('--glow-intensity', intensity);
    card.style.setProperty('--glow-rgb', GLOW_RGB);
    return intensity;
  }

  document.addEventListener('mousemove', function(e) {
    spotlight.style.left = e.clientX + 'px';
    spotlight.style.top = e.clientY + 'px';
    spotlight.style.opacity = '0.7';
    document.querySelectorAll('.glow-card').forEach(c => {
      updateGlow(c, e.clientX, e.clientY);
    });
  });

  document.addEventListener('mouseleave', function() {
    spotlight.style.opacity = '0';
    document.querySelectorAll('.glow-card').forEach(c => { c.style.setProperty('--glow-intensity', '0'); });
  });

  // --- Ripple on click ---
  document.addEventListener('click', function(e) {
    const card = e.target.closest('.glow-card');
    if (!card) return;
    const r = card.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const maxDist = Math.max(
      Math.hypot(x, y), Math.hypot(x - r.width, y),
      Math.hypot(x, y - r.height), Math.hypot(x - r.width, y - r.height)
    );
    const ripple = document.createElement('div');
    ripple.className = 'glow-ripple';
    ripple.style.cssText = `width:${maxDist*2}px;height:${maxDist*2}px;left:${x-maxDist}px;top:${y-maxDist}px;`;
    ripple.style.setProperty('--glow-rgb', GLOW_RGB);
    card.appendChild(ripple);
    ripple.addEventListener('animationend', function(){ ripple.remove(); });
  });
})();
